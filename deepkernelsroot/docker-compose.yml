services:

  engine:
    container_name: deepkernels-engine
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - ~/deepkernels/live_artifacts:/app/artifacts
      - ~/deepkernels/data:/app/data
      - .:/app
      - keops_cache:/app/.cache/pykeops
    working_dir: /app
    environment:
      - PYTHONPATH=/app:/app/app:/app/src
      - WEIGHTS_PATH=/app/artifacts/princess_weights.pth
      - SCALER_PATH=/app/artifacts/features.pkl
      - KEOPS_CHUNKS_SIZE=1024 
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - PYKEOPS_CACHE_DIR=/app/.cache/pykeops
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    expose:
      - "8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, utility]
    restart: unless-stopped
  # ----------------------------------------------------
  # -- Front-facing UI --- dash / plotly --
  # ----------------------------------------------------
  dash:
    container_name: deepkernels-dash
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8050:8050"
    environment:
      - API_BASE_URL=http://engine:8000
      - PYTHONPATH=/app/app:/app:/app/src
    depends_on:
      - engine
    restart: unless-stopped

  # ----------------------------------------------------
  # -- Reverse Proxy (HTTPS/SSL) --
  # ----------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: deepkernels-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dash

  # ----------------------------------------------------
  # -- Dev Build (Profile: dev) --
  # ----------------------------------------------------
  research:
    container_name: deepkernels-research
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8888:8888"
      - "5000:5000"
    volumes:
      - .:/app
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    devices:
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-uvm:/dev/nvidia-uvm
    profiles: ["dev"]

volumes:
  caddy_data:
  caddy_config:
  keops_cache: