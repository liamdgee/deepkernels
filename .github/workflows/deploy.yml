name: Deploy DeepKernels API

on:
  push:
    branches:
      - main

jobs:
  # JOB 1: The Safety Net
  test-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      # If this fails, the deploy stops instantly. Vultr is untouched.
      - name: Run Safety Checks
        run: pytest tests/test_api.py

  # JOB 2: The Actual Deploy
  deploy-to-vultr:
    needs: test-code # <-- This is the magic lock. It waits for JOB 1.
    runs-on: ubuntu-latest
    steps:
      - name: SSH into Vultr and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VULTR_IP }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          script: |
            cd ~/deepkernels/deepkernelsroot
            git pull origin main
            docker-compose up -d --build
            docker image prune -f