on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  test-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Caches dependencies to speed up subsequent runs
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Installs the package in the current directory (.) 
          # The [test] extra ensures test dependencies like pytest are installed 
          # (adjust this to [dev] or leave it blank based on your pyproject.toml)
          pip install .[test]
        
      - name: Run Safety Checks
        run: pytest tests/test_api.py